<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin - Desa Persiapan Kiera</title>
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="login-body">

  <div class="login-card">
    <div class="login-header">
      <div class="login-logo" style="background: none; border-radius: 0; width: auto; height: auto;"><img src="../uploads/logo.png" alt="Logo Maluku Barat Daya" style="width:80px;height:80px;object-fit:contain;"></div>
      <h1 class="login-title">Admin Panel</h1>
      <p class="login-subtitle">Desa Persiapan Kiera</p>
    </div>

    <div id="errorAlert" class="alert alert-danger"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username" class="form-label">Username</label>
        <input type="text" id="username" name="username" class="form-control" placeholder="Masukkan username" required autofocus>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="Masukkan password" required>
      </div>

      <button type="submit" class="btn btn-primary btn-block">🔐 Masuk</button>
    </form>
  </div>

  <script>
    // Redirect if already logged in
    async function checkSession() {
      try {
        const res = await fetch('/api/auth/me');
        if (res.ok) {
          window.location.href = 'index.html';
        }
      } catch (e) {
        // Ignored
      }
    }
    checkSession();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const usernameInput = document.getElementById('username').value;
      const passwordInput = document.getElementById('password').value;
      const errorAlert = document.getElementById('errorAlert');

      errorAlert.style.display = 'none';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            username: usernameInput,
            password: passwordInput
          })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          window.location.href = 'index.html';
        } else {
          errorAlert.textContent = data.error || 'Username atau password salah';
          errorAlert.style.display = 'block';
        }
      } catch (err) {
        errorAlert.textContent = 'Gagal terhubung ke server';
        errorAlert.style.display = 'block';
      }
    });
  </script>
</body>
</html>
